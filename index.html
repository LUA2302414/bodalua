<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video y Grabación de Audio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
            background-color: #5c652e; /* Fondo cambiado */
            color: white; /* Cambia el color del texto a blanco */
        }
        video {
            width: 100%;
            max-width: 600px;
        }
        button {
            margin-top: 10px;
            padding: 15px;
            border: none;
            border-radius: 50%; /* Botón circular */
            background-color: #8f9b5b; /* Color del botón */
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #a0ab6c; /* Color al pasar el mouse */
        }
    </style>
</head>
<body>
    <h1>♥ DEJA UN MENSAJE A LOS NOVIOS ♥</h1>
    
    <input type="file" id="videoInput" accept="video/*">
    <video id="videoPlayer" controls></video>

    <button id="recordButton">🎤</button>
    <audio id="audioPlayer" controls></audio>
    
    <script>
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const recordButton = document.getElementById('recordButton');
        const audioPlayer = document.getElementById('audioPlayer');

        let mediaRecorder;
        let audioChunks = [];

        // Cargar el video seleccionado
        videoInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                videoPlayer.src = url;
                videoPlayer.play(); // Reproduce automáticamente el video
            }
        });

        // Configurar grabación de audio
        recordButton.addEventListener('click', async () => {
            if (!mediaRecorder) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioChunks = [];

                    // Guardar el audio automáticamente
                    const downloadUrl = URL.createObjectURL(audioBlob);
                    const a = document.createElement('a');
                    const fileName = `grabacion_audio_${new Date().toISOString().slice(0, 19).replace(/:/g, "-")}.wav`;
                    a.href = downloadUrl;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };
            }

            if (mediaRecorder.state === 'inactive') {
                mediaRecorder.start();
                recordButton.textContent = '🔴'; // Cambia el texto al grabar
            } else {
                mediaRecorder.stop();
                recordButton.textContent = '🎤'; // Restaura el texto
            }
        });
    </script>
</body>
</html>
